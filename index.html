<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>植樂島 Plant Island · 組裝指南</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "Helvetica Neue", "PingFang TC", "Microsoft JhengHei", sans-serif;
    background: #f7f6f3;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 24px;
  }
  .card {
    width: 100%;
    max-width: 560px;
    background: #fff;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 8px 40px rgba(0,0,0,0.10);
  }
  .top-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 20px;
    border-bottom: 1px solid #efefef;
  }
  .brand {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.10em;
    color: #888;
  }
  .step-counter {
    font-size: 12px;
    color: #aaa;
    font-variant-numeric: tabular-nums;
  }
  .image-stage {
    position: relative;
    width: 100%;
    aspect-ratio: 4/3;
    background: #f0efec;
    overflow: hidden;
  }
  .slide {
    position: absolute;
    inset: 0;
    opacity: 0;
    transition: opacity 0.5s ease, transform 0.5s ease;
    transform: scale(1.03);
  }
  .slide.active {
    opacity: 1;
    transform: scale(1);
  }
  .slide img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center;
    display: block;
  }
  .overlay {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    background: linear-gradient(transparent, rgba(0,0,0,0.52));
    padding: 36px 20px 18px;
    pointer-events: none;
  }
  .step-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.14em;
    color: rgba(255,255,255,0.65);
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .step-title {
    font-size: 18px;
    font-weight: 500;
    color: #fff;
    line-height: 1.3;
  }
  .progress-wrap { height: 2px; background: #eee; }
  .progress-fill { height: 2px; background: #333; transition: width 0.4s ease; }
  .controls {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px 20px;
    border-bottom: 1px solid #f0f0f0;
  }
  .btn {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 38px; height: 38px;
    border-radius: 50%;
    border: 1.5px solid #ddd;
    background: #fff;
    cursor: pointer;
    flex-shrink: 0;
    transition: background 0.15s, border-color 0.15s;
    outline: none;
  }
  .btn:hover { background: #f5f5f5; border-color: #bbb; }
  .btn:active { transform: scale(0.94); }
  .btn svg { width: 15px; height: 15px; fill: #333; }
  .play-btn { width: 44px; height: 44px; background: #222; border-color: #222; }
  .play-btn svg { fill: #fff; width: 16px; height: 16px; }
  .play-btn:hover { background: #444; border-color: #444; }
  .step-desc { flex: 1; font-size: 13px; color: #666; line-height: 1.6; padding-left: 2px; }
  .dots {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 5px;
    padding: 12px 20px 16px;
    flex-wrap: wrap;
  }
  .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #ccc;
    cursor: pointer;
    transition: all 0.25s ease;
    flex-shrink: 0;
    border: none; outline: none; padding: 0;
  }
  .dot.active { background: #222; width: 20px; border-radius: 3px; }
</style>
</head>

  </div>
  <div class="image-stage" id="stage"></div>

  </div>

</div>

let cur = 0, playing = false, timer = null;
function build() {
  const stage = document.getElementById('stage');
  const dotsEl = document.getElementById('dots');
  STEPS.forEach(function(s, i) {
    var div = document.createElement('div');
    div.className = 'slide' + (i === 0 ? ' active' : '');
    div.id = 'slide' + i;
    var img = document.createElement('img');
    img.src = s.src;
    img.alt = s.title;
    img.loading = 'lazy';
    var ov = document.createElement('div');
    ov.className = 'overlay';
    ov.innerHTML = '<div class="step-label">' + s.label + '</div><div class="step-title">' + s.title + '</div>';
    div.appendChild(img);
    div.appendChild(ov);
    stage.appendChild(div);
    var d = document.createElement('button');
    d.className = 'dot' + (i === 0 ? ' active' : '');
    d.id = 'dot' + i;
    (function(idx){ d.onclick = function(){ goTo(idx); }; })(i);
    dotsEl.appendChild(d);
  });
  update();
}
function goTo(idx) {
  document.getElementById('slide' + cur).classList.remove('active');
  document.getElementById('dot' + cur).classList.remove('active');
  cur = idx;
  document.getElementById('slide' + cur).classList.add('active');
  document.getElementById('dot' + cur).classList.add('active');
  update();
}
function go(dir) {
  var next = Math.max(0, Math.min(STEPS.length - 1, cur + dir));
  if (next !== cur) goTo(next);
}
function update() {
  document.getElementById('counter').textContent = (cur + 1) + ' / ' + STEPS.length;
  document.getElementById('desc').textContent = STEPS[cur].desc;
  document.getElementById('prog').style.width = ((cur + 1) / STEPS.length * 100) + '%';
}
function togglePlay() {
  playing = !playing;
  var icon = document.getElementById('playIcon');
  if (playing) {
    icon.innerHTML = '<rect x="3" y="3" width="4" height="10"/><rect x="9" y="3" width="4" height="10"/>';
    tick();
  } else {
    icon.innerHTML = '<path d="M5 3l8 5-8 5V3z"/>';
    clearTimeout(timer);
  }
}
function tick() {
  if (!playing) return;
  timer = setTimeout(function() {
    if (cur < STEPS.length - 1) { go(1); tick(); }
    else { playing = false; document.getElementById('playIcon').innerHTML = '<path d="M5 3l8 5-8 5V3z"/>'; }
  }, 3500);
}
build();
</script>
