<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>植樂島 經銷合作報價試算</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=DM+Mono:wght@400;500&display=swap');

  :root {
    --green-dark: #1a3a2a;
    --green-mid: #2d6a4f;
    --green-light: #52b788;
    --green-pale: #b7e4c7;
    --cream: #f8f4ec;
    --cream-dark: #ede8dc;
    --gold: #c9a84c;
    --text: #1a2e1e;
    --text-light: #5a7a62;
    --red: #c0392b;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--cream);
    color: var(--text);
    font-family: 'Noto Serif TC', serif;
    min-height: 100vh;
    padding: 40px 20px;
    background-image: 
      radial-gradient(circle at 10% 20%, rgba(82,183,136,0.08) 0%, transparent 50%),
      radial-gradient(circle at 90% 80%, rgba(45,106,79,0.06) 0%, transparent 50%);
  }

  .container {
    max-width: 640px;
    margin: 0 auto;
  }

  .header-top {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    margin-bottom: 0;
  }

  .header-titles {
    flex: 1;
  }

  .header-logo {
    height: 140px;
    mix-blend-mode: multiply;
    flex-shrink: 0;
    margin-left: 16px;
    display: block;
    align-self: flex-end;
    margin-bottom: -12px;
  }

  .header-divider {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    border-top: 1px solid var(--green-pale);
    margin-top: 16px;
    padding-top: 12px;
    gap: 8px;
  }

  .header-tags {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: flex-end;
  }

  header {
    text-align: left;
    margin-bottom: 40px;
    padding-bottom: 0;
    position: relative;
  }

  .brand-tag {
    display: inline-block;
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--green-mid);
    font-family: 'DM Mono', monospace;
    margin-bottom: 12px;
    border: 1px solid var(--green-pale);
    padding: 4px 12px;
    border-radius: 2px;
  }

  h1 {
    font-size: 28px;
    font-weight: 700;
    color: var(--green-dark);
    line-height: 1.3;
    margin-bottom: 8px;
  }

  .subtitle {
    font-size: 13px;
    color: var(--text-light);
    font-weight: 400;
  }

  .card {
    background: white;
    border-radius: 12px;
    padding: 32px;
    margin-bottom: 20px;
    border: 1px solid var(--cream-dark);
    box-shadow: 0 2px 16px rgba(26,58,42,0.06);
  }

  .card-title {
    font-size: 12px;
    letter-spacing: 2px;
    color: var(--text-light);
    font-family: 'DM Mono', monospace;
    margin-bottom: 20px;
    text-transform: uppercase;
  }

  /* Input section */
  .input-row {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 20px;
  }

  .input-label {
    font-size: 15px;
    color: var(--text);
    white-space: nowrap;
  }

  .qty-control {
    display: flex;
    align-items: center;
    gap: 0;
    border: 1.5px solid var(--green-pale);
    border-radius: 8px;
    overflow: hidden;
    flex: 1;
  }

  .qty-btn {
    width: 44px;
    height: 44px;
    background: var(--cream);
    border: none;
    font-size: 20px;
    color: var(--green-mid);
    cursor: pointer;
    transition: background 0.15s;
    font-family: 'DM Mono', monospace;
    flex-shrink: 0;
  }

  .qty-btn:hover { background: var(--green-pale); }

  .qty-input {
    flex: 1;
    height: 44px;
    border: none;
    text-align: center;
    font-size: 18px;
    font-family: 'DM Mono', monospace;
    font-weight: 500;
    color: var(--green-dark);
    background: white;
    outline: none;
    min-width: 60px;
  }

  /* Invoice toggle */
  .toggle-row {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .toggle {
    position: relative;
    width: 46px;
    height: 26px;
    cursor: pointer;
  }

  .toggle input { display: none; }

  .toggle-track {
    position: absolute;
    inset: 0;
    background: var(--cream-dark);
    border-radius: 13px;
    transition: background 0.2s;
  }

  .toggle input:checked + .toggle-track { background: var(--green-light); }

  .toggle-thumb {
    position: absolute;
    top: 3px;
    left: 3px;
    width: 20px;
    height: 20px;
    background: white;
    border-radius: 50%;
    transition: transform 0.2s;
    box-shadow: 0 1px 4px rgba(0,0,0,0.15);
  }

  .toggle input:checked ~ .toggle-thumb { transform: translateX(20px); }

  .toggle-label {
    font-size: 14px;
    color: var(--text);
  }

  .tax-note {
    font-size: 12px;
    color: var(--text-light);
    margin-left: 4px;
  }

  /* Result */
  .result-card {
    background: var(--green-dark);
    color: white;
    border-radius: 12px;
    padding: 32px;
    margin-bottom: 20px;
    position: relative;
    overflow: hidden;
  }

  .result-card::before {
    content: '';
    position: absolute;
    top: -40px;
    right: -40px;
    width: 160px;
    height: 160px;
    border-radius: 50%;
    background: rgba(82,183,136,0.12);
  }

  .result-card::after {
    content: '';
    position: absolute;
    bottom: -60px;
    left: -20px;
    width: 200px;
    height: 200px;
    border-radius: 50%;
    background: rgba(82,183,136,0.07);
  }

  .result-card .card-title { color: var(--green-pale); }

  .discount-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 24px;
    position: relative;
    z-index: 1;
  }

  .discount-number {
    font-size: 48px;
    font-weight: 700;
    font-family: 'DM Mono', monospace;
    color: var(--gold);
    line-height: 1;
  }

  .discount-unit {
    font-size: 14px;
    color: var(--green-pale);
    margin-top: 8px;
  }

  .price-breakdown {
    position: relative;
    z-index: 1;
  }

  .price-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 10px 0;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }

  .price-row:last-child { border-bottom: none; }

  .price-row.total {
    padding-top: 16px;
    margin-top: 4px;
  }

  .price-label {
    font-size: 13px;
    color: rgba(255,255,255,0.6);
  }

  .price-value {
    font-family: 'DM Mono', monospace;
    font-size: 15px;
    color: white;
  }

  .price-row.total .price-label {
    font-size: 14px;
    color: rgba(255,255,255,0.8);
    font-weight: 600;
  }

  .price-row.total .price-value {
    font-size: 22px;
    font-weight: 600;
    color: var(--gold);
  }

  .price-row.tax .price-value {
    color: var(--gold);
  }

  /* Tier table */
  .tier-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }

  .tier-table th {
    text-align: left;
    padding: 8px 12px;
    font-size: 11px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text-light);
    font-family: 'DM Mono', monospace;
    font-weight: 400;
    border-bottom: 1px solid var(--cream-dark);
  }

  .tier-table th:not(:first-child) { text-align: right; }

  .tier-table td {
    padding: 10px 12px;
    border-bottom: 1px solid var(--cream-dark);
    color: var(--text);
  }

  .tier-table td:not(:first-child) {
    text-align: right;
    font-family: 'DM Mono', monospace;
  }

  .tier-table tr:last-child td { border-bottom: none; }

  .tier-table tr.active-tier td {
    background: var(--green-dark);
    color: white;
  }

  .tier-table tr.active-tier td:first-child {
    border-radius: 6px 0 0 6px;
  }

  .tier-table tr.active-tier td:last-child {
    border-radius: 0 6px 6px 0;
  }

  .tier-table tr.active-tier .discount-cell {
    color: var(--green-light);
    font-weight: 600;
  }

  .notice {
    font-size: 12px;
    color: var(--text-light);
    line-height: 1.8;
    padding: 16px;
    background: var(--cream);
    border-radius: 8px;
    border-left: 3px solid var(--green-pale);
  }

  .notice strong { color: var(--green-mid); }

  .no-result {
    text-align: center;
    padding: 20px;
    color: var(--text-light);
    font-size: 14px;
  }

  /* Animation */
  .result-card { transition: opacity 0.2s; }

  @media (max-width: 480px) {
    .card { padding: 24px 20px; }
    .result-card { padding: 24px 20px; }
    .discount-number { font-size: 36px; }
  }
</style>
</head>

    <div class="header-divider">
      <div class="header-tags">
        <div class="brand-tag">智慧家用種植機</div>
        <div class="brand-tag" style="font-family:'DM Mono', monospace; letter-spacing:1px;">IVHT162501</div>
      </div>

  </header>

  <!-- Input -->
  <div class="card">
    <div class="card-title">輸入條件</div>

    <div class="input-row">
      <span class="input-label">購買數量</span>
      <div class="qty-control">
        <button class="qty-btn" onclick="changeQty(-1)">−</button>
        <input class="qty-input" type="number" id="qtyInput" value="1" min="1" oninput="calculate()">
        <button class="qty-btn" onclick="changeQty(1)">+</button>
      </div>
      <span style="font-size:14px; color:var(--text-light);">台</span>
    </div>

    <div class="toggle-row">
      <label class="toggle">
        <input type="checkbox" id="taxToggle" onchange="calculate()">
        <div class="toggle-track"></div>
        <div class="toggle-thumb"></div>
      </label>
      <span class="toggle-label">需要開發票</span>
      <span class="tax-note">（+5% 稅，由客戶負擔）</span>
    </div>
  </div>

  <!-- Result -->
  <div class="result-card" id="resultCard">
    <div class="card-title">報價結果</div>
    <div id="resultContent">
      <div class="no-result">請輸入購買台數</div>
    </div>
  </div>

  <!-- Tier table -->
  <div class="card">
    <div class="card-title">折扣級距一覽</div>
    <table class="tier-table" id="tierTable">
      <thead>
        <tr>
          <th>台數</th>
          <th>折數</th>
          <th>單台含運未稅</th>
          <th>總價</th>
        </tr>
      </thead>
      <tbody id="tierBody"></tbody>
    </table>
  </div>

  <!-- Notice -->
  <div class="notice">
    <strong>說明事項</strong><br>
    · 以上報價為<strong>含運未稅</strong>合作經銷價<br>
    · 如需開立發票，請自行加計 <strong>5% 營業稅</strong><br>
    · 基準售價 NT$3,480（募資期最終售價）<br>
    · 募資結束後售價調漲，折扣基準將隨新售價更新<br>
    · 100台以上為最低折扣，不再往下調整
  </div>

</div>

<script>
  const TIERS = [
    { min: 1,   max: 1,    discount: 0.85 },
    { min: 2,   max: 2,    discount: 0.82 },
    { min: 3,   max: 4,    discount: 0.80 },
    { min: 5,   max: 9,    discount: 0.78 },
    { min: 10,  max: 19,   discount: 0.75 },
    { min: 20,  max: 29,   discount: 0.72 },
    { min: 30,  max: 99,   discount: 0.70 },
    { min: 100, max: 9999, discount: 0.65 },
  ];

  const BASE = 3480;

  // Representative qty for table display
  const TIER_DISPLAY = [
    { label: '1 台',   qty: 1   },
    { label: '2 台',   qty: 2   },
    { label: '3 台',   qty: 3   },
    { label: '5 台',   qty: 5   },
    { label: '10 台',  qty: 10  },
    { label: '20 台',  qty: 20  },
    { label: '30 台',  qty: 30  },
    { label: '100 台', qty: 100 },
  ];

  function getTier(qty) {
    return TIERS.find(t => qty >= t.min && qty <= t.max);
  }

  function fmt(n) {
    return 'NT$' + Math.round(n).toLocaleString('zh-TW');
  }

  function discountLabel(d) {
    return (d * 10).toFixed(1).replace(/\.0$/, '') + '折';
  }

  function calculate() {
    const qty = parseInt(document.getElementById('qtyInput').value) || 0;
    const withTax = document.getElementById('taxToggle').checked;

    // Result card
    const content = document.getElementById('resultContent');

    if (qty < 1) {
      content.innerHTML = '<div class="no-result">請輸入有效台數</div>';
      renderTable(-1);
      return;
    }

    const tier = getTier(qty);
    if (!tier) {
      content.innerHTML = '<div class="no-result">無法取得折扣資訊</div>';
      return;
    }

    const unitPrice = BASE * tier.discount;
    const subtotal = unitPrice * qty;
    const tax = withTax ? subtotal * 0.05 : 0;
    const total = subtotal + tax;
    const avgUnit = total / qty;

    let html = `
      <div class="discount-badge">
        <div>
          <div class="discount-number">${discountLabel(tier.discount)}</div>
          <div class="discount-unit">${qty} 台適用折扣</div>
        </div>
      </div>
      <div class="price-breakdown">
        <div class="price-row">
          <span class="price-label">小計（${qty} 台）</span>
          <span class="price-value">${fmt(subtotal)}</span>
        </div>`;

    if (withTax) {
      html += `
        <div class="price-row tax">
          <span class="price-label">營業稅 5%</span>
          <span class="price-value">${fmt(tax)}</span>
        </div>`;
    }

    html += `
        <div class="price-row total">
          <span class="price-label">總金額${withTax ? '（含稅）' : '（未稅）'}</span>
          <span class="price-value">${fmt(total)}</span>
        </div>`;

    if (qty > 1) {
      html += `
        <div class="price-row">
          <span class="price-label">平均每台</span>
          <span class="price-value">${fmt(avgUnit)}</span>
        </div>`;
    }

    html += `</div>`;
    content.innerHTML = html;

    renderTable(qty);
  }

  function renderTable(activeQty) {
    const tbody = document.getElementById('tierBody');
    const withTax = document.getElementById('taxToggle').checked;

    tbody.innerHTML = TIER_DISPLAY.map(row => {
      const tier = getTier(row.qty);
      const unit = BASE * tier.discount;
      const total = unit * row.qty * (withTax ? 1.05 : 1);

      // Determine if this row is active
      const activeTier = activeQty > 0 ? getTier(activeQty) : null;
      const isActive = activeTier && tier.discount === activeTier.discount;

      return `<tr class="${isActive ? 'active-tier' : ''}">
        <td>${row.label}</td>
        <td class="discount-cell">${discountLabel(tier.discount)}</td>
        <td>${fmt(unit)}</td>
        <td>${fmt(total)}${withTax ? '<span style="font-size:10px;opacity:0.6"> 含稅</span>' : ''}</td>
      </tr>`;
    }).join('');
  }

  function changeQty(delta) {
    const input = document.getElementById('qtyInput');
    const val = parseInt(input.value) || 0;
    input.value = Math.max(1, val + delta);
    calculate();
  }

  // Init
  calculate();
</script>
</body>
</html>
